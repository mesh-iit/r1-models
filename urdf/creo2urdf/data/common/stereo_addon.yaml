sensors:
  - linkName: head_link
    frameName: SCSYS_HEAD_ASUS_XTION_DEPTH
    sensorName: "stereo_left_depth"
    exportFrameInURDF: No
    sensorType: "rgbd_camera"
    updateRate: 30
    sensorBlobs:
    - |
                <camera name='stereo_left_depth'>
                    <pose frame=''>-0.0325 0 0 -1.57079 -1.57079 3.14159</pose>
                    <horizontal_fov>1.02259</horizontal_fov>
                    <distortion>
                        <k1>0</k1>
                        <k2>0</k2>
                        <k3>0</k3>
                        <p1>0</p1>
                        <p2>0</p2>
                        <center>319.5 239.5</center>
                    </distortion>
                    <image>
                        <width>640</width>
                        <height>480</height>
                        <format>R8G8B8</format>
                    </image>
                    <clip>
                        <near>0.02</near>
                        <far>3000</far>
                    </clip>
                </camera>

  - linkName: head_link
    frameName: SCSYS_HEAD_ASUS_XTION_RGB
    sensorName: "stereo_right_depth"
    exportFrameInURDF: No
    sensorType: "rgbd_camera"
    updateRate: 30
    sensorBlobs:
    - |
                <camera name='stereo_right_depth'>
                    <pose frame=''>0.0325 0 0 -1.57079 -1.57079 3.14159</pose>
                    <horizontal_fov>1.02259</horizontal_fov>
                    <distortion>
                        <k1>0</k1>
                        <k2>0</k2>
                        <k3>0</k3>
                        <p1>0</p1>
                        <p2>0</p2>
                        <center>319.5 239.5</center>
                    </distortion>
                    <image>
                        <width>640</width>
                        <height>480</height>
                        <format>R8G8B8</format>
                    </image>
                    <clip>
                        <near>0.02</near>
                        <far>3000</far>
                    </clip>
                </camera>

XMLBlobs:
    - |
            <gazebo>
              <plugin name="gzyarp::StereoDepthCamera" filename="gz-sim-yarp-stereodepthcamera-system">
                <yarpConfigurationString>(leftYarpDeviceName depthcamera_plugin_left_device) (rightYarpDeviceName depthcamera_plugin_right_device) (parentLinkName head_link) (leftSensorName stereo_left_depth) (rightSensorName stereo_right_depth) (stereoRgbPortName /r1mk3Sim/depthCamera/stereo/rgbImage:o) (display_timestamp) (display_time_box)</yarpConfigurationString>
              </plugin>
            </gazebo>
